version: "3.9"

# ── Local development compose ─────────────────────────────────────────────────
# Gebruik: docker compose up --build
# Vereisten: .env.local aanwezig (zie .env.local.example)
#
# Na eerste start:
#   docker compose exec mentor-web npx prisma migrate dev --name init
#   docker compose exec mentor-web npm run migrate:json-to-db  (optioneel)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mentor
      POSTGRES_USER: mentor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mentor_local_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentor -d mentor"]
      interval: 10s
      timeout: 5s
      retries: 5

  mentor-web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://mentor:${POSTGRES_PASSWORD:-mentor_local_dev}@postgres:5432/mentor
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - mentor_data:/app/data

  mentor-worker:
    build: .
    restart: unless-stopped
    command: ["npx", "tsx", "worker/index.ts"]
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://mentor:${POSTGRES_PASSWORD:-mentor_local_dev}@postgres:5432/mentor
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      mentor-web:
        condition: service_started
    volumes:
      - mentor_data:/app/data

  # ntfy — optionele push notification server (uncomment om te activeren)
  # ntfy:
  #   image: binwiederhier/ntfy
  #   restart: unless-stopped
  #   ports:
  #     - "8080:80"
  #   volumes:
  #     - ntfy_cache:/var/cache/ntfy
  #     - ntfy_etc:/etc/ntfy
  #   command: serve

volumes:
  postgres_data:
  mentor_data:
  # ntfy_cache:
  # ntfy_etc:
